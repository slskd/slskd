<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>slskd-stream</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
      color: #e8e8e8;
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    header {
      padding: 16px 20px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 { font-size: 1rem; font-weight: 600; letter-spacing: 0.05em; color: #aaa; }

    #search-form { display: flex; gap: 8px; flex: 1; max-width: 600px; }
    #search-input {
      flex: 1;
      background: #1c1c1c;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e8e8e8;
      padding: 8px 12px;
      font-size: 0.9rem;
      outline: none;
    }
    #search-input:focus { border-color: #555; }

    button {
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 6px;
      color: #e8e8e8;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 8px 14px;
    }
    button:hover { background: #333; }
    button.primary { background: #1a6b3c; border-color: #1a8a4e; }
    button.primary:hover { background: #1e7d47; }

    #status-bar {
      font-size: 0.75rem;
      color: #666;
      padding: 4px 20px;
      border-bottom: 1px solid #1a1a1a;
      height: 26px;
      display: flex;
      align-items: center;
    }

    #results {
      flex: 1;
      overflow-y: auto;
      padding: 0;
    }

    .peer-group { border-bottom: 1px solid #1a1a1a; }
    .peer-header {
      padding: 10px 20px;
      font-size: 0.78rem;
      color: #666;
      background: #141414;
      position: sticky;
      top: 0;
    }
    .peer-header strong { color: #aaa; }

    .result-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 20px;
      border-top: 1px solid #1a1a1a;
      font-size: 0.85rem;
    }
    .result-row:hover { background: #181818; }

    .play-btn {
      background: none;
      border: none;
      font-size: 1.1rem;
      padding: 2px 6px;
      color: #4caf6e;
      border-radius: 4px;
    }
    .play-btn:hover { background: #1a3a28; }
    .play-btn.active { color: #6ddb92; }

    .filename { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .meta { font-size: 0.75rem; color: #555; white-space: nowrap; }

    /* Player bar */
    #player-bar {
      border-top: 1px solid #222;
      padding: 12px 20px;
      display: none;
      flex-direction: column;
      gap: 8px;
      background: #141414;
    }
    #player-bar.visible { display: flex; }
    #player-meta { font-size: 0.8rem; color: #888; display: flex; align-items: center; gap: 10px; }
    #player-track { color: #ddd; font-weight: 500; }
    #live-badge {
      font-size: 0.68rem;
      background: #1a3a28;
      color: #4caf6e;
      border: 1px solid #2a6a40;
      border-radius: 10px;
      padding: 2px 8px;
    }
    audio { width: 100%; height: 36px; }

    #error-banner {
      display: none;
      background: #3a1515;
      border: 1px solid #6a2a2a;
      border-radius: 6px;
      color: #e88;
      font-size: 0.8rem;
      padding: 10px 14px;
      margin: 12px 20px;
      align-items: center;
      gap: 12px;
    }
    #error-banner.visible { display: flex; }
    #error-banner span { flex: 1; }

    .spinner { display: inline-block; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <h1>slskd‑stream</h1>
    <form id="search-form">
      <input id="search-input" type="text" placeholder="Search Soulseek…" autocomplete="off" autofocus>
      <button type="submit" class="primary">Search</button>
    </form>
  </header>

  <div id="status-bar">Not connected</div>

  <div id="error-banner">
    <span id="error-text">Peer disconnected.</span>
    <button id="error-dismiss">Dismiss</button>
  </div>

  <div id="results"></div>

  <div id="player-bar">
    <div id="player-meta">
      <span id="player-track">—</span>
      <span id="live-badge">● live from peer</span>
      <span id="player-peer"></span>
    </div>
    <audio id="audio-el" controls preload="none"></audio>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js" crossorigin="anonymous"></script>
  <script src="/app.js"></script>
</body>
</html>
